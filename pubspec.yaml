name: khata_app
description: Urdu Digital Ledger App - Bahi Khata
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  go_router: ^13.2.0

  uuid: ^4.4.0
  intl: ^0.20.2
  path_provider: ^2.1.3

  pdf: ^3.10.8
  printing: ^5.13.1
  share_plus: ^12.0.2
  device_preview: ^1.2.0
  screenshot: ^3.0.0
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  open_file: ^3.5.11
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  internet_connection_checker: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
        - asset: assets/fonts/NotoNastaliqUrdu-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - assets/images/
    - assets/animations/
    - assets/logo/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/app_icon.png"
  min_sdk_android: 21